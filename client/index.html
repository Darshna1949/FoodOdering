<!DOCTYPE html>
<html ng-app="foodApp">
<head>
  <title>Food Ordering</title>
</head>

<body ng-app="foodApp" ng-controller="AuthController">

  <h2>Register</h2>
  <input type="text" ng-model="user.name" placeholder="Name"><br>
  <input type="email" ng-model="user.email" placeholder="Email"><br>
  <input type="password" ng-model="user.password" placeholder="Password"><br>
  <button ng-click="register()">Register</button>

  <hr>

  <h2>Login</h2>
  <input type="email" ng-model="user.email" placeholder="Email"><br>
  <input type="password" ng-model="user.password" placeholder="Password"><br>
  <button ng-click="login()">Login</button>

  <!-- scripts -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="app.js"></script>
  <script src="services/authService.js"></script>
  <script src="controllers/authController.js"></script>

</body>
</html>
