<div>

  <h1 class="text-2xl font-bold mb-6">Manage Orders</h1>

  <div class="bg-white rounded shadow overflow-hidden">

    <table class="w-full">

      <thead class="bg-gray-100">
        <tr>
          <th class="p-3 text-left">Order ID</th>
          <th>User</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr 
          ng-repeat="order in orders"
          class="border-t align-top">

          <!-- ID -->
          <td class="p-3">{{order.id}}</td>

          <!-- User -->
          <td>{{order.user.name}}</td>

          <!-- Items -->
          <td>
            <div ng-repeat="item in order.items">
              {{item.name}} x{{item.quantity}}
            </div>
          </td>

          <!-- Total -->
          <td>₹ {{order.total}}</td>

          <!-- Status -->
          <td>
            <span 
              class="px-2 py-1 rounded text-sm"
              ng-class="{
                'bg-yellow-100 text-yellow-600': order.status === 'Pending',
                'bg-blue-100 text-blue-600': order.status === 'Preparing',
                'bg-green-100 text-green-600': order.status === 'Delivered'
              }">
              {{order.status || 'Pending'}}
            </span>
          </td>

          <!-- Action -->
          <td>
            <button 
              class="bg-orange-500 text-white px-3 py-1 rounded"
              ng-click="updateStatus(order)">
              Update
            </button>
          </td>

        </tr>
      </tbody>

    </table>

  </div>

</div>
