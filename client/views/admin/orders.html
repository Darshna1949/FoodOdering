<div class="rounded-2xl bg-white shadow-sm border border-slate-100 p-6 space-y-5">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div>
      <h1 class="text-2xl font-semibold text-slate-900">Manage Orders</h1>
      <p class="text-sm text-slate-500 mt-1">View and update order statuses.</p>
    </div>
  </div>

  <!-- 🔍 Search -->
  <div class="relative">
    <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400 text-sm">🔍</span>
    <input
      type="text"
      placeholder="Search by order ID or user..."
      class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-9 pr-3 text-base text-slate-800 placeholder:text-slate-400 shadow-sm focus:border-orange-500 focus:outline-none focus:ring-1 focus:ring-orange-400/70"
      ng-model="searchOrder">
  </div>

  <!-- 📋 Table -->
  <div class="overflow-x-auto">
    <table class="min-w-full text-left text-base">
      <thead class="bg-slate-50 border border-slate-200 text-sm uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-5 py-2">Order ID</th>
          <th class="px-3 py-2">User</th>
          <th class="px-3 py-2">Items</th>
          <th class="px-3 py-2">Total</th>
          <th class="px-3 py-2">Status</th>
          <th class="px-3 py-2 text-right">Action</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 align-top">
        <tr
          ng-repeat="order in orders | filter:searchOrder"
          class="hover:bg-slate-50/80">

          <!-- ID -->
          <td class="px-5 py-2 font-medium text-slate-900">{{order.id}}</td>

          <!-- User -->
          <td class="px-3 py-2 text-slate-700">{{order.user.name}}</td>

          <!-- Items -->
          <td class="px-3 py-2 text-slate-600">
            <div ng-repeat="item in order.items">
              {{item.name}} x{{item.quantity}}
            </div>
          </td>

          <!-- Total -->
          <td class="px-3 py-2 font-semibold text-slate-900">₹ {{order.total}}</td>

          <!-- Status -->
          <td class="px-3 py-2">
            <span
              class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium"
              ng-class="{
                'bg-yellow-50 text-yellow-700': order.status === 'Pending',
                'bg-sky-50 text-sky-700': order.status === 'Preparing',
                'bg-emerald-50 text-emerald-700': order.status === 'Delivered'
              }">
              {{order.status || 'Pending'}}
            </span>
          </td>

          <!-- Action -->
          <td class="px-3 py-2 text-right">
            <button
              class="inline-flex items-center justify-center rounded-lg bg-orange-500 px-3 py-1.5 text-sm font-medium text-white hover:bg-orange-600"
              ng-click="updateStatus(order)">
              Update
            </button>
          </td>

        </tr>
        <tr ng-if="!orders.length">
          <td colspan="6" class="px-5 py-6 text-center text-slate-500 text-base">
            No orders available yet.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
