<div>

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Manage Users</h1>
  </div>

  <!-- 🔍 Search -->
  <input 
    type="text"
    placeholder="Search users..."
    class="w-full border p-2 mb-4 rounded"
    ng-model="searchUser">

  <!-- 📋 Table -->
  <div class="bg-white rounded shadow overflow-hidden">

    <table class="w-full">

      <thead class="bg-gray-100">
        <tr>
          <th class="p-3 text-left">Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr 
          ng-repeat="user in users | filter:searchUser"
          class="border-t">

          <td class="p-3">{{user.name}}</td>
          <td>{{user.email}}</td>
          <td>
            <span class="px-2 py-1 bg-blue-100 text-blue-600 rounded text-sm">
              {{user.role}}
            </span>
          </td>

          <td>
            <span 
              class="px-2 py-1 rounded text-sm"
              ng-class="user.status === 'Active' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'">
              {{user.status}}
            </span>
          </td>

          <td class="space-x-2">

            <button 
              class="text-yellow-500"
              ng-click="toggleStatus(user)">
              🔄
            </button>

            <button 
              class="text-red-500"
              ng-click="deleteUser($index)">
              🗑
            </button>

          </td>

        </tr>
      </tbody>

    </table>

  </div>

</div>
