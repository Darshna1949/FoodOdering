<div class="p-6">

  <h2 class="text-2xl font-bold mb-6">My Profile</h2>

  <div class="bg-white p-6 rounded shadow w-full md:w-1/2 space-y-4">

    <div class="flex items-center space-x-4 mb-4">
      <div
        class="w-16 h-16 rounded-full bg-gray-200 flex items-center justify-center">
        <span class="text-xl font-bold text-gray-700">
          {{ ((user.name || 'U').charAt(0)) | uppercase }}
        </span>
      </div>
      <div>
        <p class="font-bold text-lg">{{user.name}}</p>
        <p class="text-gray-600">{{user.email}}</p>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Full Name</label>
      <input
        type="text"
        class="w-full border p-2 rounded"
        ng-model="user.name" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input
        type="email"
        class="w-full border p-2 rounded bg-gray-100 cursor-not-allowed"
        ng-model="user.email"
        disabled />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Phone Number</label>
      <input
        type="text"
        class="w-full border p-2 rounded"
        ng-model="user.phone"
        placeholder="Enter phone number" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Address</label>
      <textarea
        class="w-full border p-2 rounded"
        ng-model="user.address"
        placeholder="Enter delivery address"></textarea>
    </div>

    <div class="flex items-center space-x-4 pt-2">
      <button
        class="bg-orange-500 text-white px-4 py-2 rounded"
        ng-click="saveProfile()">
        Save Profile
      </button>

      <button
        class="bg-gray-200 text-gray-800 px-4 py-2 rounded"
        onclick="location.href='#!/orders'">
        View Order History
      </button>
    </div>

  </div>

</div>
