<div class="page-reveal px-3 py-4 sm:px-4 lg:px-6">

  <section class="hero-panel rounded-[2rem] px-5 py-7 sm:px-8 sm:py-8">
    <span class="section-kicker">Profile</span>
    <div class="mt-3 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
      <div>
        <h1 class="text-3xl sm:text-4xl font-bold text-slate-950">Keep your delivery details in sync.</h1>
        <p class="mt-2 max-w-2xl text-sm sm:text-base text-slate-600">A cleaner profile panel with a stronger avatar block and more visual depth.</p>
      </div>
      <div class="rounded-full bg-white/80 px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm">Editable details</div>
    </div>
  </section>

  <div class="mt-8 max-w-3xl">
    <div class="glass-card rounded-[1.6rem] p-6 sm:p-7 space-y-5">

      <div class="flex items-center gap-4">
        <div class="h-16 w-16 rounded-2xl bg-gradient-to-br from-orange-500 to-rose-500 flex items-center justify-center shadow-lg shadow-rose-500/25">
          <span class="text-2xl font-bold text-white">
            {{ ((user.name || 'U').charAt(0)) | uppercase }}
          </span>
        </div>
        <div>
          <p class="text-2xl font-bold text-slate-950">{{user.name}}</p>
          <p class="text-slate-500">{{user.email}}</p>
        </div>
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
          <input
            type="text"
            class="surface-input"
            ng-model="user.name" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
          <input
            type="email"
            class="surface-input bg-slate-100/80 text-slate-500 cursor-not-allowed"
            ng-model="user.email"
            disabled />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
          <input
            type="text"
            class="surface-input"
            ng-model="user.phone"
            placeholder="Enter phone number" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Address</label>
          <textarea
            class="surface-input min-h-[7.5rem] resize-y"
            ng-model="user.address"
            placeholder="Enter delivery address"></textarea>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button
          class="primary-button"
          ng-click="saveProfile()">
          Save Profile
        </button>

        <button
          class="secondary-button"
          onclick="location.href='#!/orders'">
          View Order History
        </button>
      </div>

    </div>
  </div>

</div>
