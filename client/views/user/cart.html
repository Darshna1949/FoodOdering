<div class="p-6">

  <h2 class="text-2xl font-bold mb-4">Shopping Cart</h2>

  <div class="grid md:grid-cols-3 gap-6">

    <!-- Cart Items -->
    <div class="md:col-span-2 space-y-4">

      <div 
        class="flex items-center bg-white p-4 rounded shadow"
        ng-repeat="item in cart track by $index">

        <!-- Product image with fixed size so it displays clearly -->
        <div class="w-24 h-24 overflow-hidden rounded-xl flex-shrink-0">
          <img ng-src="{{item.image}}" class="w-full h-full object-cover">
        </div>

        <div class="ml-4 flex-1">
          <h3 class="font-semibold">{{item.name}}</h3>
          <p class="text-orange-500">₹ {{item.price}}</p>

          <!-- Quantity -->
          <div class="flex items-center mt-2">
            <button class="px-2 bg-gray-200" ng-click="updateQuantity($index, -1)">-</button>
            <span class="px-3">{{item.quantity}}</span>
            <button class="px-2 bg-gray-200" ng-click="updateQuantity($index, 1)">+</button>
          </div>
        </div>

        <!-- Remove -->
        <button 
          class="text-red-500"
          ng-click="removeItem($index)">
          🗑
        </button>

      </div>

    </div>

    <!-- Summary -->
    <div class="bg-white p-4 rounded shadow">

      <h3 class="font-bold mb-3">Order Summary</h3>

      <p>Subtotal: ₹ {{getTotal() | number:2}}</p>
      <p>Tax (10%): ₹ {{(getTotal() * 0.1) | number:2}}</p>
      <p class="font-bold text-lg mt-2">
        Total: ₹ {{(getTotal() * 1.1) | number:2}}
      </p>

      <button 
        class="w-full mt-4 bg-orange-500 text-white py-2 rounded"
        ng-click="goToCheckout()">
        Proceed to Checkout
      </button>

    </div>

  </div>

</div>
