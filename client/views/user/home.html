<div>

  <!-- 🔶 Hero -->
  <div class="bg-orange-500 text-white text-center py-12">
    <h1 class="text-3xl font-bold mb-3">
      Delicious Food Delivered to Your Door
    </h1>

    <p class="mb-5">Order from our wide selection of meals</p>

    <input 
      type="text"
      placeholder="Search for dishes..."
      class="w-1/2 p-3 rounded text-black"
      ng-model="searchText"
      ng-change="onSearchChange()">
  </div>

  <!-- 🔶 Categories -->
  <div class="flex gap-3 px-6 py-4 overflow-x-auto">
    <button 
      class="px-3 py-1 rounded"
      ng-class="activeCategory === 'All' ? 'bg-orange-500 text-white' : 'bg-gray-200'"
      ng-click="setCategory('All')">
      All
    </button>
    <button 
      class="px-3 py-1 rounded"
      ng-class="activeCategory === 'Pizza' ? 'bg-orange-500 text-white' : 'bg-gray-200'"
      ng-click="setCategory('Pizza')">
      Pizza
    </button>
    <button 
      class="px-3 py-1 rounded"
      ng-class="activeCategory === 'Burgers' ? 'bg-orange-500 text-white' : 'bg-gray-200'"
      ng-click="setCategory('Burgers')">
      Burgers
    </button>
    <button 
      class="px-3 py-1 rounded"
      ng-class="activeCategory === 'Desserts' ? 'bg-orange-500 text-white' : 'bg-gray-200'"
      ng-click="setCategory('Desserts')">
      Desserts
    </button>
    <button 
      class="px-3 py-1 rounded"
      ng-class="activeCategory === 'Beverages' ? 'bg-orange-500 text-white' : 'bg-gray-200'"
      ng-click="setCategory('Beverages')">
      Beverages
    </button>
  </div>

  <!-- 🔶 Food Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 px-6 pb-10">

    <div 
      class="bg-white rounded-xl shadow p-4 flex flex-col"
      ng-repeat="item in foods">

      <!-- Image wrapper keeps a consistent aspect ratio so images look clean -->
      <div class="w-full overflow-hidden rounded-xl mb-3" style="aspect-ratio: 4 / 3;">
        <img 
          ng-src="{{item.image}}" 
          class="w-full h-full object-cover">
      </div>

      <h3 class="font-semibold text-lg">
        {{item.name}}
      </h3>

      <p class="text-gray-500 text-sm">
        {{item.description}}
      </p>

      <p class="text-orange-500 font-bold mt-1">
        ₹ {{item.price}}
      </p>

      <button 
        class="mt-3 w-full bg-orange-500 text-white py-2 rounded hover:bg-orange-600"
        ng-click="addToCart(item)">
        + Add to Cart
      </button>

    </div>

  </div>

</div>
