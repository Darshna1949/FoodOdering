<div>

  <!-- 🔶 Page Content -->
  <div class="p-6">

    <h2 class="text-2xl font-bold mb-6">📦 Order History</h2>

    <!-- ❌ Empty State -->
    <div ng-if="orders.length === 0" class="text-center mt-10">
      <p class="text-gray-500 text-lg">No orders yet 😔</p>
      <button 
        class="mt-4 bg-orange-500 text-white px-4 py-2 rounded"
        onclick="location.href='#!/home'">
        Browse Food
      </button>
    </div>

    <!-- ✅ Orders List -->
    <div class="grid gap-6 md:grid-cols-2">

      <div 
        class="bg-white p-5 rounded-xl shadow mb-6 w-full"
        ng-repeat="order in orders track by order.id">

        <!-- Order Header -->
        <div class="flex justify-between items-center mb-3">
          <p class="text-sm text-gray-500">
            Order ID: {{order.id}}
          </p>
          <p class="text-sm text-gray-500">
            {{order.date}}
          </p>
        </div>

        <!-- Items -->
        <div class="border-t pt-3">
          <div 
            class="flex justify-between mb-2"
            ng-repeat="item in order.items">

            <span>{{item.name}} x{{item.quantity}}</span>
            <span>₹ {{item.price * item.quantity}}</span>
          </div>
        </div>

        <!-- Total -->
        <div class="border-t mt-3 pt-3 flex justify-between font-bold">
          <span>Total</span>
          <span>₹ {{order.total}}</span>
        </div>

      </div>

    </div>

  </div>

</div>
